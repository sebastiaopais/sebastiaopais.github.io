<!DOCTYPE html>
<html lang="pt">
<head>
    <meta charset="UTF-8">
    <title>Enterprise Hub 2026 - Versão Final</title>
    <style>
        :root { --primary: #2563eb; --success: #16a34a; --danger: #dc2626; --warning: #f59e0b; --bg: #f8fafc; --text: #1e293b; }
        body { font-family: 'Inter', system-ui, sans-serif; background: var(--bg); color: var(--text); margin: 0; padding: 20px; }
        .container { max-width: 1400px; margin: auto; background: white; padding: 2rem; border-radius: 12px; box-shadow: 0 4px 20px rgba(0,0,0,0.08); min-height: 85vh; }
        
        /* Navegação */
        .nav-bar { display: flex; gap: 10px; margin-bottom: 2rem; border-bottom: 2px solid #e2e8f0; padding-bottom: 1rem; align-items: center; overflow-x: auto; }
        .logo { font-weight: 800; font-size: 1.2rem; color: var(--primary); margin-right: 20px; }
        
        button { padding: 8px 14px; cursor: pointer; border-radius: 6px; border: 1px solid #cbd5e1; background: white; font-weight: 600; transition: 0.2s; white-space: nowrap; }
        button:hover { background: #f1f5f9; }
        .btn-active { border-color: var(--primary); color: var(--primary); background: #eff6ff; }
        .btn-main { background: var(--primary); color: white; border: none; }
        .btn-add-func { width: 220px !important; display: block; }

        h2 { font-size: 1.25rem; margin-top: 2rem; color: #334155; border-left: 4px solid var(--primary); padding-left: 10px; }
        .grid { display: grid; grid-template-columns: 1.3fr 0.7fr; gap: 30px; margin-top: 20px; align-items: start; }
        
        table { width: 100%; border-collapse: collapse; background: white; margin-bottom: 20px; }
        th { text-align: left; padding: 12px; background: #f1f5f9; color: #475569; font-size: 0.75rem; text-transform: uppercase; border-bottom: 2px solid #e2e8f0; }
        td { padding: 10px; border-bottom: 1px solid #f1f5f9; vertical-align: top; }
        
        .badge-project { display: inline-block; background: #f1f5f9; color: #475569; padding: 2px 8px; border-radius: 4px; font-size: 0.7rem; margin-right: 4px; border: 1px solid #e2e8f0; margin-bottom: 4px; }
        
        .staff-selector { display: flex; flex-wrap: wrap; gap: 4px; margin-top: 6px; }
        .staff-label { font-size: 0.65rem; display: flex; align-items: center; gap: 3px; background: #f8fafc; padding: 2px 6px; border-radius: 4px; border: 1px solid #e2e8f0; cursor: pointer; }
        
        input, textarea, select { width: 100%; border: 1px solid #cbd5e1; padding: 8px; border-radius: 6px; font-size: 0.9rem; box-sizing: border-box; }
        .header-input { font-size: 1.8rem; font-weight: 800; border: none !important; background: transparent; margin-bottom: 10px; width: 70%; }
        
        .finance-footer { margin-top: 15px; padding: 15px; background: #f8fafc; border-radius: 8px; border: 1px solid #e2e8f0; }
        .fin-row { display: flex; justify-content: space-between; padding: 5px 0; font-size: 0.95rem; }
        .fin-total-bold { border-top: 2px solid #cbd5e1; margin-top: 10px; padding-top: 10px; font-weight: 900; font-size: 1.1rem; }
        
        .row-concluida { opacity: 0.5; background-color: #f0fdf4; }

        @media print {
            .nav-bar, button, .staff-selector, .logo, input[type="file"], select, th:last-child, td:last-child { display: none !important; }
            body { background: white; padding: 0; }
            .container { box-shadow: none; border: none; max-width: 100%; width: 100%; }
            .grid { grid-template-columns: 1fr; }
            input, textarea { border: none !important; padding: 0 !important; font-size: 1.1rem !important; }
        }
    </style>
</head>
<body>

<div class="container">
    <div class="nav-bar">
        <div class="logo">PROJECT HUB 2026</div>
        <button id="nav-dash" onclick="switchView('dash')">📊 Dashboard</button>
        <button id="nav-equipa" onclick="switchView('equipa')">👥 Equipa</button>
        <div id="project-nav-btns" style="display: flex; gap: 5px;"></div>
        <button onclick="addProject()" style="background: #f0fdf4; color: #166534; border-color: #bbf7d0;">+ Novo Projeto</button>
        <div style="flex-grow: 1;"></div>
        <button onclick="window.print()">🖨️ Imprimir</button>
        <button class="btn-main" onclick="downloadJSON()">💾 Exportar</button>
        <button onclick="document.getElementById('importFile').click()">📂 Importar</button>
        <input type="file" id="importFile" style="display:none" onchange="importJSON(event)">
    </div>

    <div id="main-content"></div>
</div>

<script>
    const HOJE = new Date("2026-03-19");
    let currentView = 'dash';
    
    let db = JSON.parse(localStorage.getItem('ent_db_final_v12')) || {
        funcionarios: [{ id: "1", nome: "Colaborador Exemplo", cargo: "Gestor" }],
        projetos: []
    };

    function save() { localStorage.setItem('ent_db_final_v12', JSON.stringify(db)); render(); }
    function switchView(view) { currentView = view; render(); }

    function getMeta(p) {
        const tTotal = p.tarefas?.length || 0;
        const tDone = p.tarefas?.filter(t => t.done).length || 0;
        const perc = tTotal === 0 ? 0 : Math.round((tDone / tTotal) * 100);
        const vTotal = p.pagamentos?.reduce((s, pag) => s + (parseFloat(pag.valor) || 0), 0) || 0;
        const vPago = p.pagamentos?.filter(pag => pag.pago).reduce((s, pag) => s + (parseFloat(pag.valor) || 0), 0) || 0;
        return { perc, vTotal, vPago, vPendente: vTotal - vPago };
    }

    function render() {
        const content = document.getElementById('main-content');
        const navBtns = document.getElementById('project-nav-btns');
        document.getElementById('nav-dash').className = currentView === 'dash' ? 'btn-active' : '';
        document.getElementById('nav-equipa').className = currentView === 'equipa' ? 'btn-active' : '';

        navBtns.innerHTML = db.projetos.map((p, idx) => `
            <button class="${currentView === idx ? 'btn-active' : ''}" onclick="switchView(${idx})">${p.titulo || 'P'+(idx+1)}</button>
        `).join('');

        if (currentView === 'dash') renderDash(content);
        else if (currentView === 'equipa') renderEquipa(content);
        else renderProject(content, currentView);
    }

    function renderDash(target) {
        const cargaTrabalho = db.funcionarios.map(f => {
            let abertas = 0;
            let projNames = new Set();
            db.projetos.forEach(p => {
                p.tarefas?.forEach(t => {
                    if (t.responsavelIds?.includes(String(f.id))) {
                        if (!t.done) abertas++;
                        projNames.add(p.titulo || "S/ Título");
                    }
                });
            });
            return { nome: f.nome, abertas, projetos: Array.from(projNames) };
        });

        target.innerHTML = `
            <h2>Resumo de Projetos</h2>
            <table>
                <thead><tr><th>Projeto</th><th>Progresso</th><th>Orçamento Total</th><th>Pago / Pendente</th><th>Ação</th></tr></thead>
                <tbody>
                    ${db.projetos.map((p, idx) => {
                        const m = getMeta(p);
                        return `<tr>
                            <td><strong>${p.titulo || 'Sem Título'}</strong></td>
                            <td>${m.perc}%</td>
                            <td><strong>${m.vTotal.toLocaleString('pt-PT')}€</strong></td>
                            <td><span style="color:var(--success)">${m.vPago.toLocaleString('pt-PT')}€</span> / <span style="color:var(--danger)">${m.vPendente.toLocaleString('pt-PT')}€</span></td>
                            <td><button onclick="switchView(${idx})">Abrir</button></td>
                        </tr>`;
                    }).join('')}
                </tbody>
            </table>

            <h2>Ocupação da Equipa</h2>
            <table>
                <thead><tr><th>Colaborador</th><th>Pendentes</th><th>Projetos Envolvidos</th></tr></thead>
                <tbody>
                    ${cargaTrabalho.map(f => `
                        <tr>
                            <td><strong>${f.nome}</strong></td>
                            <td>${f.abertas}</td>
                            <td>${f.projetos.map(name => `<span class="badge-project">${name}</span>`).join('')}</td>
                        </tr>
                    `).join('')}
                </tbody>
            </table>`;
    }

    function renderEquipa(target) {
        target.innerHTML = `
            <div style="display:flex; justify-content: space-between; align-items: center; margin-bottom:20px">
                <h2>Gestão de Funcionários</h2>
                <button class="btn-main btn-add-func" onclick="addFunc()">+ Adicionar Funcionário</button>
            </div>
            <table>
                <thead><tr><th>Nome</th><th>Cargo</th><th width="50"></th></tr></thead>
                <tbody>
                    ${db.funcionarios.map((f, i) => `
                        <tr>
                            <td><input value="${f.nome}" onchange="db.funcionarios[${i}].nome = this.value; save()"></td>
                            <td><input value="${f.cargo}" onchange="db.funcionarios[${i}].cargo = this.value; save()"></td>
                            <td><button onclick="db.funcionarios.splice(${i},1); save()" style="color:var(--danger); border:none">✕</button></td>
                        </tr>`).join('')}
                </tbody>
            </table>`;
    }

    function renderProject(target, idx) {
        const p = db.projetos[idx];
        const m = getMeta(p);
        target.innerHTML = `
            <div style="display:flex; justify-content: space-between; align-items:center;">
                <input class="header-input" value="${p.titulo || ''}" placeholder="Nome do Projeto" onchange="db.projetos[${idx}].titulo = this.value; save()">
                <button onclick="deleteProject(${idx})" style="color:var(--danger); border-color:var(--danger)">🗑 Eliminar Projeto</button>
            </div>
            <textarea placeholder="Descrição do projeto..." onchange="db.projetos[${idx}].descricao = this.value; save()">${p.descricao || ''}</textarea>
            
            <div class="grid">
                <div>
                    <h4>📅 Plano de Trabalho <button onclick="addRow(${idx}, 'tarefas')">+</button></h4>
                    <table>
                        <thead><tr><th>OK</th><th>Tarefa / Equipa</th><th>Prazo</th><th></th></tr></thead>
                        <tbody>
                            ${p.tarefas.map((t, ti) => {
                                const isLate = t.data && new Date(t.data) < HOJE && !t.done;
                                return `<tr class="${t.done ? 'row-concluida' : (isLate ? 'row-atrasada' : '')}">
                                    <td width="30"><input type="checkbox" ${t.done ? 'checked' : ''} onchange="db.projetos[${idx}].tarefas[${ti}].done = !db.projetos[${idx}].tarefas[${ti}].done; save()"></td>
                                    <td>
                                        <input type="text" value="${t.nome}" onchange="db.projetos[${idx}].tarefas[${ti}].nome = this.value; save()">
                                        <div class="staff-selector">
                                            ${db.funcionarios.map(f => `
                                                <label class="staff-label">
                                                    <input type="checkbox" ${t.responsavelIds?.includes(String(f.id)) ? 'checked' : ''} 
                                                           onchange="toggleResp(${idx}, ${ti}, '${f.id}')"> ${f.nome}
                                                </label>`).join('')}
                                        </div>
                                    </td>
                                    <td width="130"><input type="date" value="${t.data}" onchange="db.projetos[${idx}].tarefas[${ti}].data = this.value; save()"></td>
                                    <td><button onclick="db.projetos[${idx}].tarefas.splice(${ti},1); save()">✕</button></td>
                                </tr>`;
                            }).join('')}
                        </tbody>
                    </table>
                </div>
                <div>
                    <h4>💰 Orçamento e Pagamentos <button onclick="addRow(${idx}, 'pagamentos')">+</button></h4>
                    <table>
                        <thead><tr><th>Pago</th><th>Fase</th><th>Valor (€)</th><th></th></tr></thead>
                        <tbody>
                            ${p.pagamentos.map((pag, pi) => `
                                <tr class="${pag.pago ? 'row-concluida' : ''}">
                                    <td><input type="checkbox" ${pag.pago ? 'checked' : ''} onchange="db.projetos[${idx}].pagamentos[${pi}].pago = !db.projetos[${idx}].pagamentos[${pi}].pago; save()"></td>
                                    <td><input type="text" value="${pag.desc}" onchange="db.projetos[${idx}].pagamentos[${pi}].desc = this.value; save()"></td>
                                    <td><input type="number" value="${pag.valor}" onchange="db.projetos[${idx}].pagamentos[${pi}].valor = this.value; save()"></td>
                                    <td><button onclick="db.projetos[${idx}].pagamentos.splice(${pi},1); save()">✕</button></td>
                                </tr>`).join('')}
                        </tbody>
                    </table>
                    <div class="finance-footer">
                        <div class="fin-row fin-total-bold"><span>TOTAL DO PROJETO:</span> <span>${m.vTotal.toLocaleString('pt-PT')}€</span></div>
                        <div class="fin-row" style="color:var(--success)"><span>Valor Recebido (OK):</span> <span>${m.vPago.toLocaleString('pt-PT')}€</span></div>
                        <div class="fin-row" style="color:var(--danger)"><span>Valor em Falta:</span> <span>${m.vPendente.toLocaleString('pt-PT')}€</span></div>
                    </div>
                </div>
            </div>`;
    }

    function toggleResp(pIdx, tIdx, fId) {
        if (!db.projetos[pIdx].tarefas[tIdx].responsavelIds) db.projetos[pIdx].tarefas[tIdx].responsavelIds = [];
        const pos = db.projetos[pIdx].tarefas[tIdx].responsavelIds.indexOf(fId);
        if (pos > -1) db.projetos[pIdx].tarefas[tIdx].responsavelIds.splice(pos, 1);
        else db.projetos[pIdx].tarefas[tIdx].responsavelIds.push(fId);
        save();
    }
    function addFunc() { db.funcionarios.push({ id: String(Date.now()), nome: "Novo Colaborador", cargo: "" }); save(); }
    function addProject() { db.projetos.push({ titulo: "Novo Projeto", tarefas: [], pagamentos: [] }); currentView = db.projetos.length - 1; save(); }
    function addRow(pIdx, table) {
        if(table === 'tarefas') db.projetos[pIdx].tarefas.push({ nome: "", responsavelIds: [], data: "", done: false });
        else db.projetos[pIdx].pagamentos.push({ desc: "", valor: 0, pago: false });
        save();
    }
    function deleteProject(idx) { if(confirm('Eliminar projeto permanentemente?')) { db.projetos.splice(idx, 1); currentView = 'dash'; save(); } }
    function downloadJSON() {
        const dataStr = "data:text/json;charset=utf-8," + encodeURIComponent(JSON.stringify(db, null, 2));
        const a = document.createElement('a'); a.href = dataStr; a.download = 'gestao_enterprise_2026.json'; a.click();
    }
    function importJSON(e) {
        const r = new FileReader();
        r.onload = (ev) => { db = JSON.parse(ev.target.result); save(); };
        r.readAsText(e.target.files[0]);
    }
    render();
</script>
</body>
</html>
