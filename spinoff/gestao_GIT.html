<!DOCTYPE html>
<html lang="pt">
<head>
    <meta charset="UTF-8">
    <title>Enterprise Hub 2026 | Server Sync Edition</title>
    <style>
        :root { --primary: #0f172a; --accent: #2563eb; --success: #16a34a; --danger: #dc2626; --bg: #f8fafc; --text: #1e293b; }
        body { font-family: 'Inter', system-ui, sans-serif; background: var(--bg); color: var(--text); margin: 0; padding: 20px; }
        .container { max-width: 1400px; margin: auto; background: white; padding: 2.5rem; border-radius: 16px; box-shadow: 0 4px 20px rgba(0,0,0,0.05); min-height: 85vh; }
        
        /* Sync Header */
        .sync-bar { display: flex; align-items: center; gap: 15px; background: var(--primary); color: white; padding: 10px 20px; border-radius: 12px; margin-bottom: 20px; font-size: 0.85rem; }
        .dot { width: 10px; height: 10px; border-radius: 50%; background: #475569; }
        .online { background: var(--success); box-shadow: 0 0 8px var(--success); }

        .nav-bar { display: flex; gap: 10px; margin-bottom: 2rem; border-bottom: 2px solid #f1f5f9; padding-bottom: 1rem; align-items: center; overflow-x: auto; }
        .logo { font-weight: 800; font-size: 1.3rem; color: var(--primary); margin-right: 20px; }
        
        button { padding: 8px 16px; cursor: pointer; border-radius: 8px; border: 1px solid #cbd5e1; background: white; font-weight: 600; transition: 0.2s; white-space: nowrap; }
        button:hover { background: #f8fafc; }
        .btn-active { border-color: var(--accent); color: var(--accent); background: #eff6ff; }
        .btn-main { background: var(--accent); color: white; border: none; }
        
        /* Layout */
        .grid { display: grid; grid-template-columns: 1.3fr 0.7fr; gap: 30px; margin-top: 20px; }
        table { width: 100%; border-collapse: collapse; margin-bottom: 20px; }
        th { text-align: left; padding: 12px; background: #f8fafc; color: #64748b; font-size: 0.7rem; text-transform: uppercase; border-bottom: 2px solid #e2e8f0; }
        td { padding: 10px; border-bottom: 1px solid #f1f5f9; }

        /* Multi-Staff Alinhado */
        .staff-box { display: flex; flex-wrap: wrap; gap: 4px; margin-top: 6px; }
        .staff-tag { font-size: 0.65rem; display: flex; align-items: center; gap: 4px; background: #f1f5f9; padding: 3px 8px; border-radius: 4px; border: 1px solid #e2e8f0; cursor: pointer; }
        .staff-tag input { width: auto !important; margin: 0; }

        input, textarea, select { width: 100%; border: 1px solid #cbd5e1; padding: 8px; border-radius: 6px; font-size: 0.9rem; box-sizing: border-box; }
        .header-input { font-size: 2rem; font-weight: 800; border: none !important; background: transparent; margin-bottom: 10px; color: var(--primary); }

        /* Financeiro */
        .fin-card { background: #f8fafc; padding: 20px; border-radius: 12px; border: 1px solid #e2e8f0; margin-top: 10px; }
        .fin-row { display: flex; justify-content: space-between; margin-bottom: 8px; font-size: 0.95rem; }
        .fin-total { border-top: 2px solid #e2e8f0; padding-top: 12px; margin-top: 12px; font-weight: 800; font-size: 1.1rem; }

        .row-done { opacity: 0.5; background-color: #f0fdf4; }
        @media print { .nav-bar, .sync-bar, button, .staff-box, th:last-child, td:last-child { display: none !important; } }
    </style>
</head>
<body>

<div class="container">
    <div class="sync-bar">
        <div id="status-dot" class="dot"></div>
        <span id="status-text">A ligar ao servidor...</span>
        <button onclick="saveToServer()" style="margin-left:auto; background:#334155; color:white; border:none; padding:5px 15px; font-size:0.75rem;">☁️ Forçar Gravação</button>
    </div>

    <div class="nav-bar">
        <div class="logo">ENTERPRISE HUB</div>
        <button id="nav-dash" onclick="switchView('dash')">📊 Dashboard</button>
        <button id="nav-equipa" onclick="switchView('equipa')">👥 Equipa</button>
        <div id="project-nav-btns" style="display: flex; gap: 5px;"></div>
        <button onclick="addProject()" style="background:#f0fdf4; color:#166534;">+ Novo Projeto</button>
        <div style="flex-grow: 1;"></div>
        <button onclick="window.print()">🖨️ Imprimir</button>
        <button onclick="downloadJSON()">💾 Backup Local</button>
    </div>

    <div id="main-content"></div>
</div>

<script>
    const HOJE = new Date("2026-03-20");
    const API_URL = 'salvar.php';
    let currentView = 'dash';
    let db = { funcionarios: [], projetos: [] };

    // --- SINCRONIZAÇÃO SERVIDOR ---
    async function loadFromServer() {
        try {
            const res = await fetch(API_URL);
            const data = await res.json();
            if (data) db = data;
            document.getElementById('status-dot').className = 'dot online';
            document.getElementById('status-text').innerText = 'Sincronizado com o servidor';
            render();
        } catch (e) {
            document.getElementById('status-text').innerText = 'Modo Offline (Erro ao ligar)';
            db = JSON.parse(localStorage.getItem('backup_offline')) || { funcionarios: [], projetos: [] };
            render();
        }
    }

    async function saveToServer() {
        localStorage.setItem('backup_offline', JSON.stringify(db)); // Backup de emergência
        try {
            const res = await fetch(API_URL, {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify(db)
            });
            if (res.ok) {
                document.getElementById('status-text').innerText = 'Gravado no servidor às ' + new Date().toLocaleTimeString();
            }
        } catch (e) {
            document.getElementById('status-text').innerText = 'Erro ao gravar! (Dados guardados localmente)';
        }
    }

    // --- LÓGICA DE INTERFACE ---
    function switchView(view) { currentView = view; render(); }

    function getMeta(p) {
        const tTotal = p.tarefas?.length || 0;
        const tDone = p.tarefas?.filter(t => t.done).length || 0;
        const vTotal = p.pagamentos?.reduce((s, pag) => s + (parseFloat(pag.valor) || 0), 0) || 0;
        const vPago = p.pagamentos?.filter(pag => pag.pago).reduce((s, pag) => s + (parseFloat(pag.valor) || 0), 0) || 0;
        return { perc: tTotal === 0 ? 0 : Math.round((tDone/tTotal)*100), vTotal, vPago, vPend: vTotal - vPago };
    }

    function render() {
        const content = document.getElementById('main-content');
        const navBtns = document.getElementById('project-nav-btns');
        document.getElementById('nav-dash').className = currentView === 'dash' ? 'btn-active' : '';
        document.getElementById('nav-equipa').className = currentView === 'equipa' ? 'btn-active' : '';

        navBtns.innerHTML = db.projetos.map((p, idx) => `
            <button class="${currentView === idx ? 'btn-active' : ''}" onclick="switchView(${idx})">${p.titulo || 'P'+(idx+1)}</button>
        `).join('');

        if (currentView === 'dash') renderDash(content);
        else if (currentView === 'equipa') renderEquipa(content);
        else renderProject(content, currentView);
    }

    function renderDash(target) {
        target.innerHTML = `
            <h2>Projetos e Financeiro</h2>
            <table>
                <thead><tr><th>Projeto</th><th>Progresso</th><th>Orçamento</th><th>Pago</th><th>Pendente</th><th>Ação</th></tr></thead>
                <tbody>
                    ${db.projetos.map((p, idx) => {
                        const m = getMeta(p);
                        return `<tr>
                            <td><strong>${p.titulo || 'Sem Título'}</strong></td>
                            <td>${m.perc}%</td>
                            <td>${m.vTotal.toLocaleString('pt-PT')}€</td>
                            <td style="color:var(--success)">${m.vPago.toLocaleString('pt-PT')}€</td>
                            <td style="color:var(--danger)">${m.vPend.toLocaleString('pt-PT')}€</td>
                            <td><button onclick="switchView(${idx})">Abrir</button></td>
                        </tr>`;
                    }).join('')}
                </tbody>
            </table>
            <h2>Carga de Trabalho por Funcionário</h2>
            <table>
                <thead><tr><th>Funcionário</th><th>Projetos Ativos</th><th>Tarefas Pendentes</th></tr></thead>
                <tbody>
                    ${db.funcionarios.map(f => {
                        let pendentes = 0; let projs = new Set();
                        db.projetos.forEach(p => p.tarefas?.forEach(t => {
                            if(t.responsavelIds?.includes(String(f.id)) && !t.done) { pendentes++; projs.add(p.titulo || "S/T"); }
                        }));
                        return `<tr><td><strong>${f.nome}</strong></td><td>${Array.from(projs).join(', ')}</td><td>${pendentes}</td></tr>`;
                    }).join('')}
                </tbody>
            </table>`;
    }

    function renderEquipa(target) {
        target.innerHTML = `
            <div style="display:flex; justify-content:space-between; align-items:center; margin-bottom:20px">
                <h2>Equipa</h2>
                <button class="btn-main" style="width:200px" onclick="addFunc()">+ Adicionar Funcionário</button>
            </div>
            <table>
                <thead><tr><th>Nome</th><th>Cargo</th><th></th></tr></thead>
                <tbody>
                    ${db.funcionarios.map((f, i) => `
                        <tr>
                            <td><input value="${f.nome}" onchange="db.funcionarios[${i}].nome = this.value; saveToServer()"></td>
                            <td><input value="${f.cargo}" onchange="db.funcionarios[${i}].cargo = this.value; saveToServer()"></td>
                            <td><button onclick="db.funcionarios.splice(${i},1); saveToServer()" style="color:var(--danger); border:none">✕</button></td>
                        </tr>`).join('')}
                </tbody>
            </table>`;
    }

    function renderProject(target, idx) {
        const p = db.projetos[idx]; const m = getMeta(p);
        target.innerHTML = `
            <div style="display:flex; justify-content:space-between; align-items:center;">
                <input class="header-input" value="${p.titulo || ''}" onchange="db.projetos[${idx}].titulo = this.value; saveToServer()">
                <button onclick="deleteProject(${idx})" style="color:var(--danger); border-color:var(--danger)">🗑 Eliminar</button>
            </div>
            <textarea placeholder="Descrição..." onchange="db.projetos[${idx}].descricao = this.value; saveToServer()">${p.descricao || ''}</textarea>
            <div class="grid">
                <div>
                    <h4>Tarefas <button onclick="addRow(${idx}, 'tarefas')">+</button></h4>
                    <table>
                        <thead><tr><th>Ok</th><th>Tarefa / Equipa</th><th>Prazo</th><th></th></tr></thead>
                        <tbody>
                            ${p.tarefas.map((t, ti) => `<tr class="${t.done ? 'row-done' : ''}">
                                <td><input type="checkbox" ${t.done ? 'checked' : ''} onchange="db.projetos[${idx}].tarefas[${ti}].done = !db.projetos[${idx}].tarefas[${ti}].done; saveToServer()"></td>
                                <td>
                                    <input type="text" value="${t.nome}" onchange="db.projetos[${idx}].tarefas[${ti}].nome = this.value; saveToServer()">
                                    <div class="staff-box">
                                        ${db.funcionarios.map(f => `<label class="staff-tag"><input type="checkbox" ${t.responsavelIds?.includes(String(f.id)) ? 'checked' : ''} onchange="toggleResp(${idx}, ${ti}, '${f.id}')"> ${f.nome}</label>`).join('')}
                                    </div>
                                </td>
                                <td><input type="date" value="${t.data}" onchange="db.projetos[${idx}].tarefas[${ti}].data = this.value; saveToServer()"></td>
                                <td><button onclick="db.projetos[${idx}].tarefas.splice(${ti},1); saveToServer()">✕</button></td>
                            </tr>`).join('')}
                        </tbody>
                    </table>
                </div>
                <div>
                    <h4>Pagamentos <button onclick="addRow(${idx}, 'pagamentos')">+</button></h4>
                    <table>
                        <thead><tr><th>Ok</th><th>Fase</th><th>Valor</th><th></th></tr></thead>
                        <tbody>
                            ${p.pagamentos.map((pag, pi) => `<tr class="${pag.pago ? 'row-done' : ''}">
                                <td><input type="checkbox" ${pag.pago ? 'checked' : ''} onchange="db.projetos[${idx}].pagamentos[${pi}].pago = !db.projetos[${idx}].pagamentos[${pi}].pago; saveToServer()"></td>
                                <td><input type="text" value="${pag.desc}" onchange="db.projetos[${idx}].pagamentos[${pi}].desc = this.value; saveToServer()"></td>
                                <td><input type="number" value="${pag.valor}" onchange="db.projetos[${idx}].pagamentos[${pi}].valor = this.value; saveToServer()"></td>
                                <td><button onclick="db.projetos[${idx}].pagamentos.splice(${pi},1); saveToServer()">✕</button></td>
                            </tr>`).join('')}
                        </tbody>
                    </table>
                    <div class="fin-card">
                        <div class="fin-row"><span>Total:</span> <strong>${m.vTotal.toLocaleString('pt-PT')}€</strong></div>
                        <div class="fin-row" style="color:var(--success)"><span>Pago:</span> <strong>${m.vPago.toLocaleString('pt-PT')}€</strong></div>
                        <div class="fin-row fin-total" style="color:var(--danger)"><span>Pendente:</span> <strong>${m.vPend.toLocaleString('pt-PT')}€</strong></div>
                    </div>
                </div>
            </div>`;
    }

    function toggleResp(pIdx, tIdx, fId) {
        if (!db.projetos[pIdx].tarefas[tIdx].responsavelIds) db.projetos[pIdx].tarefas[tIdx].responsavelIds = [];
        const pos = db.projetos[pIdx].tarefas[tIdx].responsavelIds.indexOf(fId);
        if (pos > -1) db.projetos[pIdx].tarefas[tIdx].responsavelIds.splice(pos, 1);
        else db.projetos[pIdx].tarefas[tIdx].responsavelIds.push(fId);
        saveToServer();
    }
    function addFunc() { db.funcionarios.push({ id: String(Date.now()), nome: "Novo Nome", cargo: "" }); saveToServer(); }
    function addProject() { db.projetos.push({ titulo: "Novo Projeto", tarefas: [], pagamentos: [] }); currentView = db.projetos.length - 1; saveToServer(); }
    function addRow(pIdx, table) {
        if(table === 'tarefas') db.projetos[pIdx].tarefas.push({ nome: "", responsavelIds: [], data: "", done: false });
        else db.projetos[pIdx].pagamentos.push({ desc: "", valor: 0, pago: false });
        saveToServer();
    }
    function deleteProject(idx) { if(confirm('Eliminar?')) { db.projetos.splice(idx, 1); currentView = 'dash'; saveToServer(); } }
    function downloadJSON() {
        const a = document.createElement('a');
        a.href = "data:text/json;charset=utf-8," + encodeURIComponent(JSON.stringify(db));
        a.download = 'backup_projetos.json'; a.click();
    }
    loadFromServer();
</script>
</body>
</html>
