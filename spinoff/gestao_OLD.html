<!DOCTYPE html>
<html lang="pt">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Enterprise Hub 2026 | Gestão Profissional</title>
    <style>
        :root { 
            --primary: #0f172a; --accent: #2563eb; --success: #16a34a; 
            --danger: #dc2626; --warning: #f59e0b; --bg: #f8fafc; --text: #1e293b; 
        }
        
        body { font-family: 'Inter', system-ui, -apple-system, sans-serif; background: var(--bg); color: var(--text); margin: 0; padding: 20px; line-height: 1.5; }
        .container { max-width: 1400px; margin: auto; background: white; padding: 2.5rem; border-radius: 16px; box-shadow: 0 10px 25px -5px rgba(0,0,0,0.05); min-height: 85vh; border: 1px solid #e2e8f0; }
        
        /* Navegação Superior */
        .nav-bar { display: flex; gap: 12px; margin-bottom: 2.5rem; border-bottom: 2px solid #f1f5f9; padding-bottom: 1.2rem; align-items: center; overflow-x: auto; }
        .logo { font-weight: 800; font-size: 1.4rem; color: var(--primary); margin-right: 30px; letter-spacing: -0.5px; }
        
        button { padding: 10px 18px; cursor: pointer; border-radius: 8px; border: 1px solid #e2e8f0; background: white; font-weight: 600; transition: all 0.2s; font-size: 0.85rem; display: flex; align-items: center; gap: 6px; }
        button:hover { background: #f8fafc; border-color: #cbd5e1; transform: translateY(-1px); }
        .btn-active { border-color: var(--accent); color: var(--accent); background: #eff6ff; box-shadow: 0 0 0 1px var(--accent); }
        .btn-main { background: var(--primary); color: white; border: none; }
        .btn-main:hover { background: #1e293b; opacity: 0.9; }
        .btn-delete { color: var(--danger); border: 1px solid #fee2e2; }
        .btn-delete:hover { background: #fef2f2; }

        /* Dashboard e Tabelas */
        h2 { font-size: 1.4rem; margin-top: 2.5rem; color: var(--primary); display: flex; align-items: center; gap: 10px; }
        h2::before { content: ""; width: 4px; height: 24px; background: var(--accent); border-radius: 4px; }
        
        .grid { display: grid; grid-template-columns: 1.4fr 0.6fr; gap: 40px; margin-top: 25px; align-items: start; }
        table { width: 100%; border-collapse: collapse; margin-bottom: 30px; }
        th { text-align: left; padding: 14px; background: #f8fafc; color: #64748b; font-size: 0.7rem; text-transform: uppercase; letter-spacing: 0.05em; border-bottom: 2px solid #e2e8f0; }
        td { padding: 12px; border-bottom: 1px solid #f1f5f9; vertical-align: top; }
        
        /* Carga Equipa Badges */
        .badge-project { display: inline-block; background: #f1f5f9; color: #475569; padding: 3px 10px; border-radius: 6px; font-size: 0.75rem; margin-right: 6px; border: 1px solid #e2e8f0; margin-bottom: 6px; font-weight: 500; }
        
        /* Seleção de Staff na Tarefa */
        .staff-selector { display: flex; flex-wrap: wrap; gap: 6px; margin-top: 8px; padding: 10px; background: #f8fafc; border-radius: 8px; border: 1px solid #f1f5f9; }
        .staff-label { font-size: 0.7rem; display: flex; align-items: center; gap: 5px; background: white; padding: 4px 10px; border-radius: 6px; border: 1px solid #e2e8f0; cursor: pointer; transition: 0.2s; }
        .staff-label:hover { border-color: var(--accent); }
        .staff-label input { width: auto !important; margin: 0; }
        
        /* Inputs */
        input, textarea, select { width: 100%; border: 1px solid #cbd5e1; padding: 10px 14px; border-radius: 8px; font-size: 0.95rem; box-sizing: border-box; transition: 0.2s; }
        input:focus, textarea:focus { outline: none; border-color: var(--accent); box-shadow: 0 0 0 3px rgba(37, 99, 235, 0.1); }
        .header-input { font-size: 2.2rem; font-weight: 800; border: none !important; background: transparent; margin-bottom: 5px; width: 80%; color: var(--primary); letter-spacing: -1px; }
        
        /* Resumo Financeiro */
        .finance-card { margin-top: 20px; padding: 20px; background: #f8fafc; border-radius: 12px; border: 1px solid #e2e8f0; }
        .fin-line { display: flex; justify-content: space-between; padding: 6px 0; font-size: 1rem; }
        .fin-total { border-top: 2px solid #e2e8f0; margin-top: 12px; padding-top: 12px; font-weight: 800; font-size: 1.25rem; color: var(--primary); }

        .row-done { opacity: 0.6; background-color: #f0fdf4; }
        .row-late { background-color: #fff7ed; }

        @media print {
            .nav-bar, button, .staff-selector, .logo, input[type="file"], select, th:last-child, td:last-child { display: none !important; }
            body { background: white; padding: 0; }
            .container { box-shadow: none; border: none; max-width: 100%; width: 100%; }
            .grid { grid-template-columns: 1fr; }
            input, textarea { border: none !important; padding: 0 !important; font-size: 1.1rem !important; }
            .staff-label { border: none !important; }
        }
    </style>
</head>
<body>

<div class="container">
    <div class="nav-bar">
        <div class="logo">ENTERPRISE HUB</div>
        <button id="nav-dash" onclick="switchView('dash')">📊 Dashboard</button>
        <button id="nav-equipa" onclick="switchView('equipa')">👥 Equipa</button>
        <div id="project-nav-btns" style="display: flex; gap: 5px;"></div>
        <button onclick="addProject()" style="background: #f0fdf4; color: #166534; border-color: #bbf7d0;">+ Criar Projeto</button>
        <div style="flex-grow: 1;"></div>
        <button onclick="window.print()">🖨️ Imprimir</button>
        <button class="btn-main" onclick="downloadJSON()">💾 Exportar Backup</button>
        <button onclick="document.getElementById('importFile').click()">📂 Importar</button>
        <input type="file" id="importFile" style="display:none" onchange="importJSON(event)">
    </div>

    <div id="main-content"></div>
</div>

<script>
    const HOJE = new Date("2026-03-19");
    let currentView = 'dash';
    
    let db = JSON.parse(localStorage.getItem('ent_db_vFinal')) || {
        funcionarios: [{ id: "1", nome: "Novo Colaborador", cargo: "Cargo" }],
        projetos: []
    };

    function save() { localStorage.setItem('ent_db_vFinal', JSON.stringify(db)); render(); }
    function switchView(view) { currentView = view; render(); }

    function getMeta(p) {
        const tTotal = p.tarefas?.length || 0;
        const tDone = p.tarefas?.filter(t => t.done).length || 0;
        const perc = tTotal === 0 ? 0 : Math.round((tDone / tTotal) * 100);
        const vTotal = p.pagamentos?.reduce((s, pag) => s + (parseFloat(pag.valor) || 0), 0) || 0;
        const vPago = p.pagamentos?.filter(pag => pag.pago).reduce((s, pag) => s + (parseFloat(pag.valor) || 0), 0) || 0;
        return { perc, vTotal, vPago, vPendente: vTotal - vPago };
    }

    function render() {
        const content = document.getElementById('main-content');
        const navBtns = document.getElementById('project-nav-btns');
        document.getElementById('nav-dash').className = currentView === 'dash' ? 'btn-active' : '';
        document.getElementById('nav-equipa').className = currentView === 'equipa' ? 'btn-active' : '';

        navBtns.innerHTML = db.projetos.map((p, idx) => `
            <button class="${currentView === idx ? 'btn-active' : ''}" onclick="switchView(${idx})">${p.titulo || 'P'+(idx+1)}</button>
        `).join('');

        if (currentView === 'dash') renderDash(content);
        else if (currentView === 'equipa') renderEquipa(content);
        else renderProject(content, currentView);
    }

    function renderDash(target) {
        const cargaTrabalho = db.funcionarios.map(f => {
            let pendentes = 0;
            let projs = new Set();
            db.projetos.forEach(p => {
                p.tarefas?.forEach(t => {
                    if (t.responsavelIds?.includes(String(f.id))) {
                        if (!t.done) pendentes++;
                        projs.add(p.titulo || "S/ Título");
                    }
                });
            });
            return { nome: f.nome, pendentes, projs: Array.from(projs) };
        });

        target.innerHTML = `
            <h2>Resumo de Projetos</h2>
            <table>
                <thead><tr><th>Nome do Projeto</th><th>Progresso</th><th>Orçamento Total</th><th>Recebido / Em Aberto</th><th>Ação</th></tr></thead>
                <tbody>
                    ${db.projetos.map((p, idx) => {
                        const m = getMeta(p);
                        return `<tr>
                            <td><strong>${p.titulo || 'Sem Título'}</strong></td>
                            <td><span style="font-weight:700">${m.perc}%</span></td>
                            <td><strong>${m.vTotal.toLocaleString('pt-PT')}€</strong></td>
                            <td><span style="color:var(--success)">${m.vPago.toLocaleString('pt-PT')}€</span> / <span style="color:var(--danger)">${m.vPendente.toLocaleString('pt-PT')}€</span></td>
                            <td><button onclick="switchView(${idx})">Abrir</button></td>
                        </tr>`;
                    }).join('')}
                </tbody>
            </table>

            <h2>Alocação de Equipa</h2>
            <table>
                <thead><tr><th>Funcionário</th><th>Tarefas Ativas</th><th>Projetos em Mão</th></tr></thead>
                <tbody>
                    ${cargaTrabalho.map(f => `
                        <tr>
                            <td><strong>${f.nome}</strong></td>
                            <td>${f.pendentes}</td>
                            <td>${f.projs.map(n => `<span class="badge-project">${n}</span>`).join('')}</td>
                        </tr>
                    `).join('')}
                </tbody>
            </table>`;
    }

    function renderEquipa(target) {
        target.innerHTML = `
            <div style="display:flex; justify-content: space-between; align-items: center; margin-bottom:20px">
                <h2>Equipa Interna</h2>
                <button class="btn-main" style="width:240px" onclick="addFunc()">+ Adicionar Colaborador</button>
            </div>
            <table>
                <thead><tr><th>Nome Completo</th><th>Cargo / Função</th><th width="50"></th></tr></thead>
                <tbody>
                    ${db.funcionarios.map((f, i) => `
                        <tr>
                            <td><input value="${f.nome}" onchange="db.funcionarios[${i}].nome = this.value; save()"></td>
                            <td><input value="${f.cargo}" onchange="db.funcionarios[${i}].cargo = this.value; save()"></td>
                            <td><button onclick="db.funcionarios.splice(${i},1); save()" style="color:var(--danger); border:none">✕</button></td>
                        </tr>`).join('')}
                </tbody>
            </table>`;
    }

    function renderProject(target, idx) {
        const p = db.projetos[idx];
        const m = getMeta(p);
        target.innerHTML = `
            <div style="display:flex; justify-content: space-between; align-items:center;">
                <input class="header-input" value="${p.titulo || ''}" placeholder="Título do Projeto" onchange="db.projetos[${idx}].titulo = this.value; save()">
                <button class="btn-delete" onclick="deleteProject(${idx})">🗑 Eliminar</button>
            </div>
            <textarea placeholder="Notas e objetivos do projeto..." onchange="db.projetos[${idx}].descricao = this.value; save()">${p.descricao || ''}</textarea>
            
            <div class="grid">
                <div>
                    <h4>Tarefas de Projeto <button onclick="addRow(${idx}, 'tarefas')">+</button></h4>
                    <table>
                        <thead><tr><th>Ok</th><th>Descrição / Equipa</th><th>Prazo</th><th></th></tr></thead>
                        <tbody>
                            ${p.tarefas.map((t, ti) => {
                                const isLate = t.data && new Date(t.data) < HOJE && !t.done;
                                return `<tr class="${t.done ? 'row-done' : (isLate ? 'row-late' : '')}">
                                    <td width="30"><input type="checkbox" ${t.done ? 'checked' : ''} onchange="db.projetos[${idx}].tarefas[${ti}].done = !db.projetos[${idx}].tarefas[${ti}].done; save()"></td>
                                    <td>
                                        <input type="text" value="${t.nome}" onchange="db.projetos[${idx}].tarefas[${ti}].nome = this.value; save()">
                                        <div class="staff-selector">
                                            ${db.funcionarios.map(f => `
                                                <label class="staff-label">
                                                    <input type="checkbox" ${t.responsavelIds?.includes(String(f.id)) ? 'checked' : ''} 
                                                           onchange="toggleResp(${idx}, ${ti}, '${f.id}')"> ${f.nome}
                                                </label>`).join('')}
                                        </div>
                                    </td>
                                    <td width="150"><input type="date" value="${t.data}" onchange="db.projetos[${idx}].tarefas[${ti}].data = this.value; save()"></td>
                                    <td width="30"><button onclick="db.projetos[${idx}].tarefas.splice(${ti},1); save()">✕</button></td>
                                </tr>`;
                            }).join('')}
                        </tbody>
                    </table>
                </div>
                <div>
                    <h4>Controlo de Pagamentos <button onclick="addRow(${idx}, 'pagamentos')">+</button></h4>
                    <table>
                        <thead><tr><th>Pago</th><th>Fase</th><th>Valor (€)</th><th></th></tr></thead>
                        <tbody>
                            ${p.pagamentos.map((pag, pi) => `
                                <tr class="${pag.pago ? 'row-done' : ''}">
                                    <td><input type="checkbox" ${pag.pago ? 'checked' : ''} onchange="db.projetos[${idx}].pagamentos[${pi}].pago = !db.projetos[${idx}].pagamentos[${pi}].pago; save()"></td>
                                    <td><input type="text" value="${pag.desc}" onchange="db.projetos[${idx}].pagamentos[${pi}].desc = this.value; save()"></td>
                                    <td><input type="number" value="${pag.valor}" onchange="db.projetos[${idx}].pagamentos[${pi}].valor = this.value; save()"></td>
                                    <td><button onclick="db.projetos[${idx}].pagamentos.splice(${pi},1); save()">✕</button></td>
                                </tr>`).join('')}
                        </tbody>
                    </table>
                    <div class="finance-card">
                        <div class="fin-line"><span>Total Contratado:</span> <span>${m.vTotal.toLocaleString('pt-PT')}€</span></div>
                        <div class="fin-line" style="color:var(--success)"><span>Total Recebido:</span> <span>${m.vPago.toLocaleString('pt-PT')}€</span></div>
                        <div class="fin-line fin-total" style="color:var(--danger)"><span>Valor Pendente:</span> <span>${m.vPendente.toLocaleString('pt-PT')}€</span></div>
                    </div>
                </div>
            </div>`;
    }

    function toggleResp(pIdx, tIdx, fId) {
        if (!db.projetos[pIdx].tarefas[tIdx].responsavelIds) db.projetos[pIdx].tarefas[tIdx].responsavelIds = [];
        const pos = db.projetos[pIdx].tarefas[tIdx].responsavelIds.indexOf(fId);
        if (pos > -1) db.projetos[pIdx].tarefas[tIdx].responsavelIds.splice(pos, 1);
        else db.projetos[pIdx].tarefas[tIdx].responsavelIds.push(fId);
        save();
    }
    function addFunc() { db.funcionarios.push({ id: String(Date.now()), nome: "Novo Colaborador", cargo: "" }); save(); }
    function addProject() { db.projetos.push({ titulo: "Novo Projeto", tarefas: [], pagamentos: [] }); currentView = db.projetos.length - 1; save(); }
    function addRow(pIdx, table) {
        if(table === 'tarefas') db.projetos[pIdx].tarefas.push({ nome: "", responsavelIds: [], data: "", done: false });
        else db.projetos[pIdx].pagamentos.push({ desc: "", valor: 0, pago: false });
        save();
    }
    function deleteProject(idx) { if(confirm('Eliminar projeto? Esta ação não pode ser desfeita.')) { db.projetos.splice(idx, 1); currentView = 'dash'; save(); } }
    function downloadJSON() {
        const dataStr = "data:text/json;charset=utf-8," + encodeURIComponent(JSON.stringify(db, null, 2));
        const a = document.createElement('a'); a.href = dataStr; a.download = 'hub_enterprise_master.json'; a.click();
    }
    function importJSON(e) {
        const r = new FileReader();
        r.onload = (ev) => { db = JSON.parse(ev.target.result); save(); };
        r.readAsText(e.target.files[0]);
    }
    render();
</script>
</body>
</html>
