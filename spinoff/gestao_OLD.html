<!DOCTYPE html>
<html lang="pt">
<head>
    <meta charset="UTF-8">
    <title>Enterprise Hub 2026 - Multi-Responsável</title>
    <style>
        :root { --primary: #2563eb; --success: #22c55e; --danger: #ef4444; --warning: #f59e0b; --bg: #f1f5f9; --text: #1e293b; }
        body { font-family: 'Inter', system-ui, sans-serif; background: var(--bg); color: var(--text); margin: 0; padding: 20px; }
        .container { max-width: 1300px; margin: auto; background: white; padding: 2rem; border-radius: 12px; box-shadow: 0 4px 20px rgba(0,0,0,0.08); min-height: 85vh; }
        
        .nav-bar { display: flex; gap: 10px; margin-bottom: 2rem; border-bottom: 2px solid #e2e8f0; padding-bottom: 1rem; align-items: center; overflow-x: auto; }
        .logo { font-weight: 800; font-size: 1.2rem; color: var(--primary); margin-right: 20px; white-space: nowrap; }
        
        button { padding: 8px 14px; cursor: pointer; border-radius: 8px; border: 1px solid #cbd5e1; background: white; font-weight: 600; transition: 0.2s; }
        .btn-active { border-color: var(--primary); color: var(--primary); background: #eff6ff; }
        .btn-main { background: var(--primary); color: white; border: none; }

        .stats-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(200px, 1fr)); gap: 15px; margin-bottom: 25px; }
        .stat-card { background: #f8fafc; padding: 1.2rem; border-radius: 10px; border: 1px solid #e2e8f0; }
        
        table { width: 100%; border-collapse: collapse; margin-top: 10px; }
        th { text-align: left; padding: 12px; background: #f8fafc; color: #64748b; font-size: 0.75rem; border-bottom: 2px solid #e2e8f0; }
        td { padding: 10px; border-bottom: 1px solid #f1f5f9; vertical-align: top; }
        
        .grid { display: grid; grid-template-columns: 1.2fr 0.8fr; gap: 30px; margin-top: 20px; }
        input, textarea { width: 100%; border: 1px solid #cbd5e1; padding: 8px; border-radius: 6px; font-size: 0.9rem; font-family: inherit; box-sizing: border-box; }
        
        /* Multi-select styling */
        .resp-container { font-size: 0.75rem; color: #64748b; margin-top: 8px; background: #f8fafc; padding: 8px; border-radius: 6px; border: 1px solid #eee; }
        .resp-item { display: flex; align-items: center; gap: 5px; margin-bottom: 3px; cursor: pointer; }
        .resp-item input { width: auto; }
        .resp-badge { display: inline-block; background: #e0f2fe; color: #0369a1; padding: 2px 6px; border-radius: 4px; margin-right: 4px; margin-top: 2px; font-weight: bold; }

        .row-atrasada { background-color: #fff7ed; }
        .row-concluida { opacity: 0.6; background-color: #f0fdf4; }
        .header-input { font-size: 1.8rem; font-weight: 800; border: none !important; background: transparent; }
    </style>
</head>
<body>

<div class="container">
    <div class="nav-bar">
        <div class="logo">ENTERPRISE HUB</div>
        <button id="nav-dash" onclick="switchView('dash')">📊 Dashboard</button>
        <button id="nav-equipa" onclick="switchView('equipa')">👥 Equipa</button>
        <div id="project-nav-btns" style="display: flex; gap: 5px;"></div>
        <button onclick="addProject()" style="background: #f0fdf4; color: #166534; border-color: #bbf7d0;">+ Projeto</button>
        <div style="flex-grow: 1;"></div>
        <button class="btn-main" onclick="downloadJSON()">💾 Exportar</button>
        <button onclick="document.getElementById('importFile').click()">📂 Importar</button>
        <input type="file" id="importFile" style="display:none" onchange="importJSON(event)">
    </div>

    <div id="main-content"></div>
</div>

<script>
    const HOJE = new Date("2026-03-18");
    let currentView = 'dash';
    
    let db = JSON.parse(localStorage.getItem('ent_db_v8')) || {
        funcionarios: [{ id: Date.now(), nome: "Colaborador 1", cargo: "Gestor" }],
        projetos: []
    };

    function save() {
        localStorage.setItem('ent_db_v8', JSON.stringify(db));
        render();
    }

    function switchView(view) { currentView = view; render(); }

    function getMeta(p) {
        const tTotal = p.tarefas?.length || 0;
        const tDone = p.tarefas?.filter(t => t.done).length || 0;
        const perc = tTotal === 0 ? 0 : Math.round((tDone / tTotal) * 100);
        const vTotal = p.pagamentos?.reduce((s, pag) => s + (parseFloat(pag.valor) || 0), 0) || 0;
        const vPago = p.pagamentos?.filter(pag => pag.pago).reduce((s, pag) => s + (parseFloat(pag.valor) || 0), 0) || 0;
        return { perc, vTotal, vPago };
    }

    function render() {
        const content = document.getElementById('main-content');
        const navBtns = document.getElementById('project-nav-btns');
        
        document.getElementById('nav-dash').className = currentView === 'dash' ? 'btn-active' : '';
        document.getElementById('nav-equipa').className = currentView === 'equipa' ? 'btn-active' : '';

        navBtns.innerHTML = db.projetos.map((p, idx) => `
            <button class="${currentView === idx ? 'btn-active' : ''}" onclick="switchView(${idx})">
                ${p.titulo || 'Projeto ' + (idx+1)}
            </button>
        `).join('');

        if (currentView === 'dash') renderDash(content);
        else if (currentView === 'equipa') renderEquipa(content);
        else renderProject(content, currentView);
    }

    function renderDash(target) {
        const totalV = db.projetos.reduce((s, p) => s + getMeta(p).vTotal, 0);
        target.innerHTML = `
            <h2>Resumo Geral</h2>
            <div class="stats-grid">
                <div class="stat-card"><h3>Projetos</h3><p>${db.projetos.length}</p></div>
                <div class="stat-card"><h3>Equipa</h3><p>${db.funcionarios.length}</p></div>
                <div class="stat-card"><h3>Volume Total</h3><p>${totalV.toLocaleString('pt-PT')}€</p></div>
            </div>
            <table>
                <thead><tr><th>Projeto</th><th>Progresso</th><th>Orçamento</th><th>Ação</th></tr></thead>
                <tbody>
                    ${db.projetos.map((p, idx) => {
                        const m = getMeta(p);
                        return `<tr>
                            <td><strong>${p.titulo || 'Sem título'}</strong></td>
                            <td>${m.perc}%</td>
                            <td>${m.vTotal.toLocaleString('pt-PT')}€</td>
                            <td><button onclick="switchView(${idx})">Abrir</button></td>
                        </tr>`;
                    }).join('')}
                </tbody>
            </table>`;
    }

    function renderEquipa(target) {
        target.innerHTML = `
            <div style="display:flex; justify-content: space-between; align-items: center; margin-bottom:20px">
                <h2>Equipa</h2>
                <button class="btn-main" onclick="addFunc()">+ Funcionário</button>
            </div>
            <table>
                <thead><tr><th>Nome</th><th>Cargo</th><th></th></tr></thead>
                <tbody>
                    ${db.funcionarios.map((f, i) => `
                        <tr>
                            <td><input value="${f.nome}" onchange="db.funcionarios[${i}].nome = this.value; save()"></td>
                            <td><input value="${f.cargo}" onchange="db.funcionarios[${i}].cargo = this.value; save()"></td>
                            <td><button onclick="db.funcionarios.splice(${i},1); save()">✕</button></td>
                        </tr>
                    `).join('')}
                </tbody>
            </table>`;
    }

    function renderProject(target, idx) {
        const p = db.projetos[idx];
        const m = getMeta(p);
        target.innerHTML = `
            <input class="header-input" value="${p.titulo || ''}" placeholder="Nome do Projeto" onchange="db.projetos[${idx}].titulo = this.value; save()">
            <textarea placeholder="Descrição..." onchange="db.projetos[${idx}].descricao = this.value; save()">${p.descricao || ''}</textarea>
            
            <div class="grid">
                <div>
                    <h4>📅 Tarefas <button onclick="addRow(${idx}, 'tarefas')">+</button></h4>
                    <table>
                        <thead><tr><th>Ok</th><th>Tarefa / Equipa Envolvida</th><th>Prazo</th><th></th></tr></thead>
                        <tbody>
                            ${p.tarefas.map((t, ti) => {
                                const isLate = t.data && new Date(t.data) < HOJE && !t.done;
                                // Obter nomes dos selecionados para mostrar badges
                                const selecionados = db.funcionarios.filter(f => t.responsavelIds?.includes(String(f.id)));

                                return `<tr class="${t.done ? 'row-concluida' : (isLate ? 'row-atrasada' : '')}">
                                    <td width="30"><input type="checkbox" ${t.done ? 'checked' : ''} onchange="db.projetos[${idx}].tarefas[${ti}].done = !db.projetos[${idx}].tarefas[${ti}].done; save()"></td>
                                    <td>
                                        <input type="text" value="${t.nome}" onchange="db.projetos[${idx}].tarefas[${ti}].nome = this.value; save()" placeholder="O que fazer?">
                                        <div class="resp-container">
                                            <strong>Atribuir a:</strong><br>
                                            ${db.funcionarios.map(f => `
                                                <label class="resp-item">
                                                    <input type="checkbox" ${t.responsavelIds?.includes(String(f.id)) ? 'checked' : ''} 
                                                        onchange="toggleResp(${idx}, ${ti}, '${f.id}')"> ${f.nome}
                                                </label>
                                            `).join('')}
                                            <div style="margin-top:5px">
                                                ${selecionados.map(s => `<span class="resp-badge">${s.nome}</span>`).join('')}
                                            </div>
                                        </div>
                                    </td>
                                    <td width="130"><input type="date" value="${t.data}" onchange="db.projetos[${idx}].tarefas[${ti}].data = this.value; save()"></td>
                                    <td><button onclick="db.projetos[${idx}].tarefas.splice(${ti},1); save()">✕</button></td>
                                </tr>`;
                            }).join('')}
                        </tbody>
                    </table>
                </div>
                <div>
                    <h4>💰 Pagamentos <button onclick="addRow(${idx}, 'pagamentos')">+</button></h4>
                    <table>
                        ${p.pagamentos.map((pag, pi) => `
                            <tr class="${pag.pago ? 'row-concluida' : ''}">
                                <td width="30"><input type="checkbox" ${pag.pago ? 'checked' : ''} onchange="db.projetos[${idx}].pagamentos[${pi}].pago = !db.projetos[${idx}].pagamentos[${pi}].pago; save()"></td>
                                <td><input type="text" value="${pag.desc}" onchange="db.projetos[${idx}].pagamentos[${pi}].desc = this.value; save()"></td>
                                <td><input type="number" value="${pag.valor}" onchange="db.projetos[${idx}].pagamentos[${pi}].valor = this.value; save()"></td>
                                <td><button onclick="db.projetos[${idx}].pagamentos.splice(${pi},1); save()">✕</button></td>
                            </tr>
                        `).join('')}
                    </table>
                    <div style="margin-top:10px; font-weight:bold; text-align:right">
                        Pendente: <span style="color:var(--danger)">${(m.vTotal - m.vPago).toLocaleString('pt-PT')}€</span>
                    </div>
                </div>
            </div>`;
    }

    function toggleResp(pIdx, tIdx, fId) {
        if (!db.projetos[pIdx].tarefas[tIdx].responsavelIds) db.projetos[pIdx].tarefas[tIdx].responsavelIds = [];
        const index = db.projetos[pIdx].tarefas[tIdx].responsavelIds.indexOf(fId);
        if (index > -1) db.projetos[pIdx].tarefas[tIdx].responsavelIds.splice(index, 1);
        else db.projetos[pIdx].tarefas[tIdx].responsavelIds.push(fId);
        save();
    }

    function addFunc() { db.funcionarios.push({ id: Date.now(), nome: "Novo Nome", cargo: "" }); save(); }
    function addProject() { db.projetos.push({ titulo: "", tarefas: [], pagamentos: [] }); currentView = db.projetos.length - 1; save(); }
    function addRow(pIdx, table) {
        if(table === 'tarefas') db.projetos[pIdx].tarefas.push({ nome: "", responsavelIds: [], data: "", done: false });
        else db.projetos[pIdx].pagamentos.push({ desc: "", valor: 0, pago: false });
        save();
    }
    function downloadJSON() {
        const dataStr = "data:text/json;charset=utf-8," + encodeURIComponent(JSON.stringify(db, null, 2));
        const a = document.createElement('a'); a.href = dataStr; a.download = 'gestao_v8.json'; a.click();
    }
    function importJSON(e) {
        const r = new FileReader();
        r.onload = (ev) => { db = JSON.parse(ev.target.result); save(); };
        r.readAsText(e.target.files[0]);
    }
    render();
</script>
</body>
</html>
